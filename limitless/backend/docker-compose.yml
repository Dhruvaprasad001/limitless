version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: limitless
      POSTGRES_USER: limitless
      POSTGRES_PASSWORD: limitless
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U limitless -d limitless"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
